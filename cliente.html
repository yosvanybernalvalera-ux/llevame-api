<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LLévame - Cliente</title>
    
    <!-- Leaflet (mapa ligero) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
        }
        
        .header {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }
        
        .menu-btn {
            background: none;
            border: none;
            font-size: 26px;
            cursor: pointer;
            color: white;
            width: auto;
            padding: 0;
        }
        
        .header h1 {
            font-size: 22px;
            color: white;
            font-weight: 600;
        }
        .header h1 span { color: #FF9800; }
        
        .user-info {
            font-size: 12px;
            color: rgba(255,255,255,0.9);
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            min-height: calc(100vh - 70px);
        }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #1a1a2e;
        }
        
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 14px;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #FF9800;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        
        button:active { transform: scale(0.98); }
        button.secondary { background: #666; }
        
        .hidden { display: none; }
        .notification {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            z-index: 1000;
        }
        
        .mapa-container {
            height: 350px;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            margin: 15px 0;
            background: #e0e0e0;
        }
        #mapaModal {
            height: 100%;
            width: 100%;
        }
        
        .ubicacion-buttons {
            display: flex;
            gap: 10px;
            margin-top: 8px;
            margin-bottom: 15px;
        }
        .ubicacion-buttons button {
            flex: 1;
            padding: 8px;
            font-size: 12px;
        }
        
        .sugerencias {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            max-height: 150px;
            overflow-y: auto;
            position: absolute;
            z-index: 1000;
            width: calc(100% - 2px);
        }
        .sugerencia-item {
            padding: 8px 12px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
            font-size: 12px;
        }
        .sugerencia-item:hover {
            background: #f0f0f0;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 300;
            display: none;
            flex-direction: column;
            padding: 20px;
        }
        .modal.open { display: flex; }
        .modal-header {
            background: #1a1a2e;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 12px 12px 0 0;
        }
        .modal-header button {
            background: none;
            font-size: 24px;
            width: auto;
            padding: 0 10px;
        }
        .modal-footer {
            padding: 15px;
            background: white;
            border-radius: 0 0 12px 12px;
        }
        
        .categorias {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        .categoria-card {
            background: #f9f9f9;
            border: 2px solid #eee;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
        }
        .categoria-card.selected {
            border-color: #FF9800;
            background: #FFF3E0;
        }
        .categoria-icon { font-size: 24px; }
        .categoria-nombre { font-size: 12px; font-weight: bold; }
        .categoria-precio { font-size: 11px; color: #FF9800; }
        
        .precio-box {
            background: #FFF3E0;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            margin: 15px 0;
        }
        .precio-box .valor {
            font-size: 28px;
            font-weight: bold;
            color: #FF9800;
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <h1>LLé<span>vame</span></h1>
        <div class="user-info" id="userName"></div>
    </div>

    <div class="container" id="app">
        <!-- Pantalla de bienvenida -->
        <div id="authScreen">
            <div class="card">
                <h2>🔐 Bienvenido</h2>
                <button onclick="mostrarLogin()">Iniciar sesión</button>
                <button onclick="mostrarRegistro()" class="secondary" style="margin-top: 12px;">Registrarme</button>
            </div>
        </div>

        <!-- Pantalla de login -->
        <div id="loginScreen" class="hidden">
            <div class="card">
                <h2>Iniciar sesión</h2>
                <input type="text" id="loginUsuario" placeholder="Usuario">
                <input type="password" id="loginPassword" placeholder="Contraseña">
                <button onclick="login()">Entrar</button>
                <button onclick="volver()" class="secondary" style="margin-top: 12px;">Volver</button>
            </div>
        </div>

        <!-- Pantalla de registro -->
        <div id="registroScreen" class="hidden">
            <div class="card">
                <h2>Crear cuenta</h2>
                <input type="text" id="regUsuario" placeholder="Usuario *">
                <input type="password" id="regPassword" placeholder="Contraseña *">
                <input type="text" id="regNombre" placeholder="Nombre *">
                <input type="text" id="regApellidos" placeholder="Apellidos *">
                <input type="text" id="regCi" placeholder="Carnet de Identidad *">
                <input type="tel" id="regTelefono" placeholder="Teléfono">
                <input type="email" id="regEmail" placeholder="Email">
                <button onclick="registro()">Registrarme</button>
                <button onclick="volver()" class="secondary" style="margin-top: 12px;">Volver</button>
            </div>
        </div>

        <!-- Sección Viaje -->
        <div id="seccionViaje" class="hidden">
            <div class="card">
                <h2>📍 ¿A dónde vas?</h2>
                
                <!-- Origen -->
                <div class="input-wrapper">
                    <input type="text" id="origen" placeholder="Origen" autocomplete="off">
                    <div id="sugerenciasOrigen" class="sugerencias hidden"></div>
                </div>
                <div class="ubicacion-buttons">
                    <button onclick="abrirMapa('origen')">🗺️ Seleccionar en mapa</button>
                    <button onclick="usarUbicacionActual()">📍 Mi ubicación</button>
                </div>
                
                <!-- Destino -->
                <div class="input-wrapper">
                    <input type="text" id="destino" placeholder="Destino" autocomplete="off">
                    <div id="sugerenciasDestino" class="sugerencias hidden"></div>
                </div>
                <div class="ubicacion-buttons">
                    <button onclick="abrirMapa('destino')">🗺️ Seleccionar en mapa</button>
                </div>
                
                <div id="categoriasSection" class="hidden">
                    <div class="categorias" id="categorias"></div>
                </div>
                
                <div id="precioSection" class="hidden">
                    <div class="precio-box">
                        <div class="valor" id="precioEstimado">-- CUP</div>
                    </div>
                </div>
                
                <button id="btnSolicitar" class="hidden" onclick="solicitarTaxi()">Confirmar Taxi</button>
            </div>
        </div>

        <!-- Modal del mapa -->
        <div id="modalMapa" class="modal">
            <div class="modal-header">
                <span id="modalTitulo">Selecciona tu ubicación</span>
                <button onclick="cerrarModalMapa()">✖</button>
            </div>
            <div class="mapa-container">
                <div id="mapaModal"></div>
            </div>
            <div class="modal-footer">
                <button onclick="confirmarUbicacionMapa()">✓ Usar esta ubicación</button>
            </div>
        </div>
    </div>

    <div id="notification" class="notification hidden"></div>

    <script>
        let token = localStorage.getItem('token');
        let categoriaSeleccionada = 'economico';
        let mapaModal = null;
        let ubicacionSeleccionada = null;
        let modoSeleccion = 'origen';
        let ubicacionActual = { lat: 23.1365, lng: -82.3589 };
        let origenCoords = null;
        let destinoCoords = null;
        
        const preciosBase = { economico: 100, confort: 150, clasico: 200, lujo: 300, moto: 80, triciclo: 50 };
        const categorias = [
            { id: 'economico', nombre: 'Económico', icono: '🚗', precio: 100 },
            { id: 'confort', nombre: 'Confort', icono: '🚙', precio: 150 },
            { id: 'clasico', nombre: 'Clásico', icono: '🚘', precio: 200 },
            { id: 'lujo', nombre: 'Lujo', icono: '✨', precio: 300 },
            { id: 'moto', nombre: 'Moto', icono: '🏍️', precio: 80 },
            { id: 'triciclo', nombre: 'Triciclo', icono: '🛺', precio: 50 }
        ];

        function toggleMenu() {
            // Por ahora vacío
        }
        
        function mostrarNotificacion(msg, tipo) {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.classList.remove('hidden');
            notif.style.background = tipo === 'error' ? '#f44336' : '#4CAF50';
            setTimeout(() => notif.classList.add('hidden'), 3000);
        }

        // ============= BÚSQUEDA DE DIRECCIONES =============
        async function buscarDirecciones(query, tipo) {
            if (query.length < 3) {
                document.getElementById(`sugerencias${tipo}`).classList.add('hidden');
                return;
            }
            
            try {
                const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5&countrycodes=cu`;
                const response = await fetch(url);
                const data = await response.json();
                
                const sugerenciasDiv = document.getElementById(`sugerencias${tipo}`);
                if (data.length > 0) {
                    sugerenciasDiv.innerHTML = data.map(item => `
                        <div class="sugerencia-item" onclick="seleccionarDireccion('${tipo}', '${item.display_name.replace(/'/g, "\\'")}', ${item.lat}, ${item.lon})">
                            ${item.display_name.substring(0, 60)}...
                        </div>
                    `).join('');
                    sugerenciasDiv.classList.remove('hidden');
                } else {
                    sugerenciasDiv.classList.add('hidden');
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        function seleccionarDireccion(tipo, direccion, lat, lng) {
            document.getElementById(tipo === 'Origen' ? 'origen' : 'destino').value = direccion;
            if (tipo === 'Origen') {
                origenCoords = { lat: parseFloat(lat), lng: parseFloat(lng) };
            } else {
                destinoCoords = { lat: parseFloat(lat), lng: parseFloat(lng) };
            }
            document.getElementById(`sugerencias${tipo}`).classList.add('hidden');
            verificarOrigenDestino();
        }
        
        // ============= MAPA =============
        function abrirMapa(tipo) {
            modoSeleccion = tipo;
            document.getElementById('modalTitulo').innerHTML = tipo === 'origen' ? '📍 Selecciona tu origen' : '🎯 Selecciona tu destino';
            document.getElementById('modalMapa').classList.add('open');
            
            setTimeout(() => {
                if (mapaModal) {
                    mapaModal.remove();
                }
                const center = (tipo === 'origen' && origenCoords) ? origenCoords : 
                             (tipo === 'destino' && destinoCoords) ? destinoCoords : ubicacionActual;
                mapaModal = L.map('mapaModal').setView([center.lat, center.lng], 16);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                    attribution: '© OpenStreetMap',
                    subdomains: 'abcd'
                }).addTo(mapaModal);
                
                let marcador = L.marker([center.lat, center.lng]).addTo(mapaModal);
                mapaModal.on('click', (e) => {
                    marcador.setLatLng(e.latlng);
                    ubicacionSeleccionada = { lat: e.latlng.lat, lng: e.latlng.lng };
                });
            }, 100);
        }
        
        function cerrarModalMapa() {
            document.getElementById('modalMapa').classList.remove('open');
            if (mapaModal) {
                mapaModal.remove();
                mapaModal = null;
            }
            ubicacionSeleccionada = null;
        }
        
        function confirmarUbicacionMapa() {
            if (ubicacionSeleccionada) {
                if (modoSeleccion === 'origen') {
                    origenCoords = ubicacionSeleccionada;
                    document.getElementById('origen').value = `${ubicacionSeleccionada.lat.toFixed(5)}, ${ubicacionSeleccionada.lng.toFixed(5)}`;
                } else {
                    destinoCoords = ubicacionSeleccionada;
                    document.getElementById('destino').value = `${ubicacionSeleccionada.lat.toFixed(5)}, ${ubicacionSeleccionada.lng.toFixed(5)}`;
                }
                cerrarModalMapa();
                verificarOrigenDestino();
                mostrarNotificacion('Ubicación seleccionada', 'exito');
            } else {
                mostrarNotificacion('Toca el mapa para seleccionar', 'error');
            }
        }
        
        function usarUbicacionActual() {
            if (navigator.geolocation) {
                mostrarNotificacion('Obteniendo ubicación...', 'exito');
                navigator.geolocation.getCurrentPosition(pos => {
                    ubicacionActual = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    origenCoords = ubicacionActual;
                    document.getElementById('origen').value = `${ubicacionActual.lat.toFixed(5)}, ${ubicacionActual.lng.toFixed(5)}`;
                    verificarOrigenDestino();
                    mostrarNotificacion('Ubicación actual seleccionada', 'exito');
                }, error => {
                    mostrarNotificacion('Error al obtener ubicación', 'error');
                });
            } else {
                mostrarNotificacion('GPS no disponible', 'error');
            }
        }
        
        // ============= FUNCIONES PRINCIPALES =============
        function verificarOrigenDestino() {
            const origen = document.getElementById('origen').value;
            const destino = document.getElementById('destino').value;
            
            if (origen && destino) {
                document.getElementById('categoriasSection').classList.remove('hidden');
                document.getElementById('precioSection').classList.remove('hidden');
                document.getElementById('btnSolicitar').classList.remove('hidden');
                cargarCategorias();
                actualizarPrecio();
            } else {
                document.getElementById('categoriasSection').classList.add('hidden');
                document.getElementById('precioSection').classList.add('hidden');
                document.getElementById('btnSolicitar').classList.add('hidden');
            }
        }
        
        function cargarCategorias() {
            const container = document.getElementById('categorias');
            container.innerHTML = categorias.map(cat => `
                <div class="categoria-card ${categoriaSeleccionada === cat.id ? 'selected' : ''}" onclick="seleccionarCategoria('${cat.id}')">
                    <div class="categoria-icon">${cat.icono}</div>
                    <div class="categoria-nombre">${cat.nombre}</div>
                    <div class="categoria-precio">${cat.precio} CUP</div>
                </div>
            `).join('');
        }
        
        function seleccionarCategoria(catId) {
            categoriaSeleccionada = catId;
            cargarCategorias();
            actualizarPrecio();
        }
        
        function actualizarPrecio() {
            let precio = preciosBase[categoriaSeleccionada] || 100;
            document.getElementById('precioEstimado').innerHTML = `${precio} CUP`;
        }
        
        // ============= LOGIN Y REGISTRO =============
        function mostrarLogin() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
        }
        
        function mostrarRegistro() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('registroScreen').classList.remove('hidden');
        }
        
        function volver() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('registroScreen').classList.add('hidden');
            document.getElementById('authScreen').classList.remove('hidden');
        }
        
        async function login() {
            const usuario = document.getElementById('loginUsuario').value;
            const password = document.getElementById('loginPassword').value;
            if (!usuario || !password) { mostrarNotificacion('Complete campos', 'error'); return; }
            try {
                const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ usuario, password }) });
                const data = await res.json();
                if (data.token) {
                    token = data.token; localStorage.setItem('token', token);
                    document.getElementById('authScreen').classList.add('hidden');
                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('registroScreen').classList.add('hidden');
                    document.getElementById('seccionViaje').classList.remove('hidden');
                    document.getElementById('userName').innerHTML = data.usuario.nombre.split(' ')[0];
                    mostrarNotificacion(`Bienvenido ${data.usuario.nombre}`, 'exito');
                } else { mostrarNotificacion(data.error || 'Error', 'error'); }
            } catch (error) { mostrarNotificacion('Error de conexión', 'error'); }
        }
        
        async function registro() {
            const usuario = document.getElementById('regUsuario').value;
            const password = document.getElementById('regPassword').value;
            const nombre = document.getElementById('regNombre').value;
            const apellidos = document.getElementById('regApellidos').value;
            const ci = document.getElementById('regCi').value;
            const telefono = document.getElementById('regTelefono').value;
            const email = document.getElementById('regEmail').value;
            if (!usuario || !password || !nombre || !apellidos || !ci) { mostrarNotificacion('Complete campos obligatorios', 'error'); return; }
            try {
                const res = await fetch('/api/registro', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ usuario, password, nombre, apellidos, ci, telefono, email }) });
                const data = await res.json();
                if (data.token) {
                    token = data.token; localStorage.setItem('token', token);
                    document.getElementById('authScreen').classList.add('hidden');
                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('registroScreen').classList.add('hidden');
                    document.getElementById('seccionViaje').classList.remove('hidden');
                    document.getElementById('userName').innerHTML = data.usuario.nombre.split(' ')[0];
                    mostrarNotificacion('Registro exitoso', 'exito');
                } else { mostrarNotificacion(data.error || 'Error', 'error'); }
            } catch (error) { mostrarNotificacion('Error de conexión', 'error'); }
        }
        
        async function solicitarTaxi() {
            const origen = document.getElementById('origen').value;
            const destino = document.getElementById('destino').value;
            if (!origen || !destino) { mostrarNotificacion('Complete origen y destino', 'error'); return; }
            
            if (!origenCoords) {
                mostrarNotificacion('Selecciona el origen en el mapa o usa tu ubicación', 'error');
                return;
            }
            if (!destinoCoords) {
                mostrarNotificacion('Selecciona el destino en el mapa', 'error');
                return;
            }
            
            const btn = document.getElementById('btnSolicitar');
            btn.disabled = true; btn.innerHTML = 'Buscando...';
            try {
                const res = await fetch('/api/viajes/solicitar', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ 
                    origen, destino, 
                    origen_coords: origenCoords, 
                    destino_coords: destinoCoords, 
                    categoria: categoriaSeleccionada 
                }) });
                const data = await res.json();
                if (data.exito) {
                    mostrarNotificacion('✅ Taxi solicitado', 'exito');
                    document.getElementById('origen').value = '';
                    document.getElementById('destino').value = '';
                    origenCoords = null;
                    destinoCoords = null;
                    document.getElementById('categoriasSection').classList.add('hidden');
                    document.getElementById('precioSection').classList.add('hidden');
                    document.getElementById('btnSolicitar').classList.add('hidden');
                } else { mostrarNotificacion(data.error || 'Error', 'error'); }
            } catch(e) { mostrarNotificacion('Error', 'error'); }
            finally { btn.disabled = false; btn.innerHTML = 'Confirmar Taxi'; }
        }
        
        // Event listeners
        document.getElementById('origen').addEventListener('input', (e) => buscarDirecciones(e.target.value, 'Origen'));
        document.getElementById('destino').addEventListener('input', (e) => buscarDirecciones(e.target.value, 'Destino'));
        
        // Ocultar sugerencias al hacer clic fuera
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.input-wrapper')) {
                document.getElementById('sugerenciasOrigen')?.classList.add('hidden');
                document.getElementById('sugerenciasDestino')?.classList.add('hidden');
            }
        });
        
        // Inicializar
        if (token) {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('seccionViaje').classList.remove('hidden');
            document.getElementById('userName').innerHTML = 'Cliente';
        }
    </script>
</body>
</html>
