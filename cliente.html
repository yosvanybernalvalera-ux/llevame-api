<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LLévame - Cliente</title>
    
    <!-- Leaflet (mapa ligero) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Mapa de fondo */
        #background-map {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
        }
        
        /* Overlay semitransparente para legibilidad */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }
        
        /* Contenido por encima */
        .header, .container, .modal {
            position: relative;
            z-index: 2;
        }
        
        .header {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        
        .menu-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: white;
            width: auto;
            padding: 0;
        }
        
        .header h1 { font-size: 20px; color: white; }
        .header h1 span { color: #FF9800; }
        .user-info { font-size: 12px; color: rgba(255,255,255,0.7); }
        
        /* Menú lateral */
        .side-menu {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            z-index: 200;
            transition: left 0.3s ease;
            padding: 70px 20px 20px;
        }
        
        .side-menu.open { left: 0; }
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 150;
            display: none;
        }
        .menu-overlay.open { display: block; }
        
        .menu-item {
            padding: 15px;
            color: white;
            font-size: 18px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .menu-item:active { background: rgba(255,255,255,0.1); }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            min-height: calc(100vh - 70px);
        }
        
        /* Tarjetas */
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        
        .card h2 { font-size: 18px; margin-bottom: 15px; color: #333; }
        
        input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 14px;
            font-size: 16px;
            background: white;
        }
        
        input:focus { outline: none; border-color: #FF9800; }
        
        button {
            width: 100%;
            padding: 14px;
            background: #FF9800;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        button.secondary { background: #666; }
        button.danger { background: #f44336; }
        button.outline {
            background: transparent;
            border: 2px solid #FF9800;
            color: #FF9800;
        }
        
        /* Botones de selección de ubicación */
        .ubicacion-buttons {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        .ubicacion-buttons button {
            flex: 1;
            padding: 10px;
            font-size: 13px;
        }
        
        /* Modal del mapa */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 300;
            display: none;
            flex-direction: column;
        }
        .modal.open { display: flex; }
        .modal-header {
            background: #1a1a2e;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-map {
            flex: 1;
            width: 100%;
        }
        .modal-footer {
            padding: 15px;
            background: white;
        }
        
        .categorias {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        .categoria-card {
            background: #f9f9f9;
            border: 2px solid #eee;
            border-radius: 14px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
        }
        .categoria-card.selected {
            border-color: #FF9800;
            background: #FFF3E0;
        }
        .categoria-icon { font-size: 24px; }
        .categoria-nombre { font-size: 11px; font-weight: bold; }
        
        .precio-box {
            background: #FFF3E0;
            border-radius: 14px;
            padding: 12px;
            text-align: center;
            margin: 15px 0;
        }
        .precio-box .valor { font-size: 28px; font-weight: bold; color: #FF9800; }
        
        .direccion-item {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
        }
        
        .viaje-activo { background: #e3f2fd; }
        .viaje-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .perfil-info { background: #f5f5f5; padding: 15px; border-radius: 14px; line-height: 1.6; margin-bottom: 15px; }
        
        .notification {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 12px;
            border-radius: 14px;
            text-align: center;
            z-index: 1000;
        }
        
        .hidden { display: none; }
        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .mt-10 { margin-top: 10px; }
        .text-center { text-align: center; }
    </style>
</head>
<body>
    <!-- Mapa de fondo -->
    <div id="background-map"></div>
    <div class="overlay"></div>
    
    <!-- Modal para seleccionar ubicación en mapa -->
    <div id="modalMapa" class="modal">
        <div class="modal-header">
            <span>Selecciona tu ubicación en el mapa</span>
            <button onclick="cerrarModalMapa()" style="width: auto; background: none; font-size: 24px;">✖</button>
        </div>
        <div id="modalMap" class="modal-map"></div>
        <div class="modal-footer">
            <button onclick="confirmarUbicacionMapa()">✓ Usar esta ubicación</button>
        </div>
    </div>
    
    <div class="header">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <h1>LLé<span>vame</span></h1>
        <div class="user-info" id="userName"></div>
    </div>
    
    <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
    <div class="side-menu" id="sideMenu">
        <div class="menu-item" onclick="cambiarSeccion('viaje')">🚖 Solicitar Viaje</div>
        <div class="menu-item" onclick="cambiarSeccion('historial')">📋 Mis Viajes</div>
        <div class="menu-item" onclick="cambiarSeccion('perfil')">👤 Mi Perfil</div>
        <div class="menu-item" onclick="cerrarSesion()">🚪 Cerrar Sesión</div>
    </div>

    <div class="container" id="app">
        <!-- Auth screens -->
        <div id="authScreen">
            <div class="card">
                <h2>🔐 Bienvenido</h2>
                <button onclick="mostrarLogin()">Iniciar sesión</button>
                <button onclick="mostrarRegistro()" class="secondary" style="margin-top: 10px;">Registrarme</button>
            </div>
        </div>

        <div id="loginScreen" class="hidden">
            <div class="card">
                <h2>Iniciar sesión</h2>
                <input type="text" id="loginUsuario" placeholder="Usuario">
                <input type="password" id="loginPassword" placeholder="Contraseña">
                <button onclick="login()">Entrar</button>
                <button onclick="volver()" class="secondary" style="margin-top: 10px;">Volver</button>
            </div>
        </div>

        <div id="registroScreen" class="hidden">
            <div class="card">
                <h2>Registro</h2>
                <input type="text" id="regUsuario" placeholder="Usuario *">
                <input type="password" id="regPassword" placeholder="Contraseña *">
                <input type="text" id="regNombre" placeholder="Nombre *">
                <input type="text" id="regApellidos" placeholder="Apellidos *">
                <input type="text" id="regCi" placeholder="CI *">
                <input type="tel" id="regTelefono" placeholder="Teléfono">
                <input type="email" id="regEmail" placeholder="Email">
                <button onclick="registro()">Registrarme</button>
                <button onclick="volver()" class="secondary" style="margin-top: 10px;">Volver</button>
            </div>
        </div>

        <!-- Sección Viaje -->
        <div id="seccionViaje">
            <div class="card">
                <h2>📍 ¿A dónde vas?</h2>
                
                <input type="text" id="origen" placeholder="Origen" readonly>
                <div class="ubicacion-buttons">
                    <button onclick="seleccionarOrigenMapa()">🗺️ Mapa</button>
                    <button onclick="seleccionarOrigenDirecciones()">📌 Mis direcciones</button>
                    <button onclick="escribirOrigenManual()">✏️ Escribir</button>
                </div>
                
                <input type="text" id="destino" placeholder="Destino">
                
                <div id="categoriasSection" class="hidden">
                    <div class="categorias" id="categorias"></div>
                </div>
                
                <div id="precioSection" class="hidden">
                    <div class="precio-box">
                        <div class="valor" id="precioEstimado">-- CUP</div>
                    </div>
                </div>
                
                <button id="btnSolicitar" class="hidden" onclick="solicitarTaxi()">Confirmar Taxi</button>
            </div>

            <div class="card viaje-activo" id="viajeActivoCard" style="display: none;">
                <h3>🚖 Viaje en curso</h3>
                <div id="viajeActivoInfo"></div>
                <button onclick="cancelarViaje()" class="danger mt-10">Cancelar</button>
            </div>
        </div>

        <!-- Sección Historial -->
        <div id="seccionHistorial" class="hidden">
            <div class="card">
                <h2>📋 Mis viajes</h2>
                <div id="historialLista">Cargando...</div>
            </div>
        </div>

        <!-- Sección Perfil -->
        <div id="seccionPerfil" class="hidden">
            <div class="card">
                <h2>👤 Mi perfil</h2>
                <div id="perfilInfo" class="perfil-info">Cargando...</div>
                <button onclick="editarPerfil()" style="background:#2196F3">Editar</button>
            </div>
            <div class="card">
                <h2>📍 Direcciones</h2>
                <div id="direccionesLista"></div>
                <button onclick="agregarDireccion()" class="outline mt-10">+ Agregar</button>
            </div>
        </div>
    </div>

    <div id="notification" class="notification hidden"></div>

    <script>
        let token = localStorage.getItem('token');
        let categoriaSeleccionada = 'economico';
        let viajeActual = null;
        let intervaloTimer = null;
        let mapaFondo = null;
        let mapaModal = null;
        let ubicacionSeleccionada = null;
        let ubicacionActual = { lat: 23.1365, lng: -82.3589 };
        
        const preciosBase = { economico: 100, confort: 150, clasico: 200, lujo: 300, moto: 80, triciclo: 50 };
        const categorias = [
            { id: 'economico', nombre: 'Económico', icono: '🚗', precio: 100 },
            { id: 'confort', nombre: 'Confort', icono: '🚙', precio: 150 },
            { id: 'clasico', nombre: 'Clásico', icono: '🚘', precio: 200 },
            { id: 'lujo', nombre: 'Lujo', icono: '✨', precio: 300 },
            { id: 'moto', nombre: 'Moto', icono: '🏍️', precio: 80 },
            { id: 'triciclo', nombre: 'Triciclo', icono: '🛺', precio: 50 }
        ];

        // ============= MAPAS =============
        function iniciarMapaFondo() {
            if (mapaFondo) return;
            mapaFondo = L.map('background-map').setView([ubicacionActual.lat, ubicacionActual.lng], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap',
                subdomains: 'abcd',
                maxZoom: 18
            }).addTo(mapaFondo);
            
            // Intentar obtener ubicación real
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    ubicacionActual = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    mapaFondo.setView([ubicacionActual.lat, ubicacionActual.lng], 15);
                }, null, { enableHighAccuracy: true });
            }
        }
        
        function abrirMapaSeleccion() {
            document.getElementById('modalMapa').classList.add('open');
            setTimeout(() => {
                if (mapaModal) mapaModal.remove();
                mapaModal = L.map('modalMap').setView([ubicacionActual.lat, ubicacionActual.lng], 16);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                    attribution: '© OpenStreetMap',
                    subdomains: 'abcd'
                }).addTo(mapaModal);
                
                let marcador = L.marker([ubicacionActual.lat, ubicacionActual.lng]).addTo(mapaModal);
                mapaModal.on('click', (e) => {
                    marcador.setLatLng(e.latlng);
                    ubicacionSeleccionada = { lat: e.latlng.lat, lng: e.latlng.lng };
                });
            }, 100);
        }
        
        function cerrarModalMapa() {
            document.getElementById('modalMapa').classList.remove('open');
            if (mapaModal) mapaModal.remove();
            ubicacionSeleccionada = null;
        }
        
        function confirmarUbicacionMapa() {
            if (ubicacionSeleccionada) {
                document.getElementById('origen').value = `📍 ${ubicacionSeleccionada.lat.toFixed(4)}, ${ubicacionSeleccionada.lng.toFixed(4)}`;
                cerrarModalMapa();
                verificarOrigenDestino();
                mostrarNotificacion('Ubicación seleccionada', 'exito');
            } else {
                mostrarNotificacion('Toca el mapa para seleccionar', 'error');
            }
        }
        
        // ============= SELECCIÓN DE ORIGEN =============
        function seleccionarOrigenMapa() { abrirMapaSeleccion(); }
        
        function seleccionarOrigenDirecciones() {
            fetch('/api/direcciones', { headers: { 'Authorization': 'Bearer ' + token } })
                .then(res => res.json())
                .then(data => {
                    const dirs = data.direcciones || [];
                    if (dirs.length === 0) {
                        mostrarNotificacion('No hay direcciones guardadas', 'error');
                    } else {
                        let msg = 'Selecciona una dirección:\n\n';
                        dirs.forEach((d, i) => { msg += `${i+1}. ${d.nombre}: ${d.direccion}\n`; });
                        const sel = prompt(msg);
                        if (sel) {
                            const idx = parseInt(sel) - 1;
                            if (dirs[idx]) {
                                document.getElementById('origen').value = dirs[idx].direccion;
                                verificarOrigenDestino();
                            }
                        }
                    }
                });
        }
        
        function escribirOrigenManual() {
            const dir = prompt('Escribe tu ubicación:');
            if (dir) {
                document.getElementById('origen').value = dir;
                verificarOrigenDestino();
            }
        }
        
        function verificarOrigenDestino() {
            const origen = document.getElementById('origen').value;
            const destino = document.getElementById('destino').value;
            
            if (origen && destino) {
                document.getElementById('categoriasSection').classList.remove('hidden');
                document.getElementById('precioSection').classList.remove('hidden');
                document.getElementById('btnSolicitar').classList.remove('hidden');
                cargarCategorias();
                actualizarPrecio();
            } else {
                document.getElementById('categoriasSection').classList.add('hidden');
                document.getElementById('precioSection').classList.add('hidden');
                document.getElementById('btnSolicitar').classList.add('hidden');
            }
        }
        
        function cargarCategorias() {
            const container = document.getElementById('categorias');
            container.innerHTML = categorias.map(cat => `
                <div class="categoria-card ${categoriaSeleccionada === cat.id ? 'selected' : ''}" onclick="seleccionarCategoria('${cat.id}')">
                    <div class="categoria-icon">${cat.icono}</div>
                    <div class="categoria-nombre">${cat.nombre}</div>
                    <div style="font-size:10px;color:#FF9800">${cat.precio} CUP</div>
                </div>
            `).join('');
        }
        
        function seleccionarCategoria(catId) {
            categoriaSeleccionada = catId;
            cargarCategorias();
            actualizarPrecio();
        }
        
        function actualizarPrecio() {
            let precio = preciosBase[categoriaSeleccionada] || 100;
            document.getElementById('precioEstimado').innerHTML = `${precio} CUP`;
        }
        
        // ============= MENÚ =============
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('open');
            document.getElementById('menuOverlay').classList.toggle('open');
        }
        
        function cambiarSeccion(seccion) {
            toggleMenu();
            document.getElementById('seccionViaje').classList.add('hidden');
            document.getElementById('seccionHistorial').classList.add('hidden');
            document.getElementById('seccionPerfil').classList.add('hidden');
            document.getElementById(`seccion${seccion.charAt(0).toUpperCase() + seccion.slice(1)}`).classList.remove('hidden');
            if (seccion === 'historial') cargarHistorial();
            if (seccion === 'perfil') { cargarPerfil(); cargarDirecciones(); }
        }
        
        function mostrarNotificacion(msg, tipo) {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.classList.remove('hidden');
            notif.style.background = tipo === 'error' ? '#f44336' : '#4CAF50';
            setTimeout(() => notif.classList.add('hidden'), 3000);
        }
        
        function mostrarLogin() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
        }
        
        function mostrarRegistro() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('registroScreen').classList.remove('hidden');
        }
        
        function volver() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('registroScreen').classList.add('hidden');
            document.getElementById('authScreen').classList.remove('hidden');
        }
        
        async function login() {
            const usuario = document.getElementById('loginUsuario').value;
            const password = document.getElementById('loginPassword').value;
            if (!usuario || !password) { mostrarNotificacion('Complete campos', 'error'); return; }
            try {
                const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ usuario, password }) });
                const data = await res.json();
                if (data.token) {
                    token = data.token; localStorage.setItem('token', token);
                    document.getElementById('authScreen').classList.add('hidden');
                    document.getElementById('userName').innerHTML = `👤 ${data.usuario.nombre.split(' ')[0]}`;
                    iniciarMapaFondo();
                    cargarPerfil(); cargarHistorial(); cargarDirecciones();
                    mostrarNotificacion(`Bienvenido ${data.usuario.nombre}`, 'exito');
                } else { mostrarNotificacion(data.error || 'Error', 'error'); }
            } catch (error) { mostrarNotificacion('Error de conexión', 'error'); }
        }
        
        async function registro() {
            const usuario = document.getElementById('regUsuario').value;
            const password = document.getElementById('regPassword').value;
            const nombre = document.getElementById('regNombre').value;
            const apellidos = document.getElementById('regApellidos').value;
            const ci = document.getElementById('regCi').value;
            const telefono = document.getElementById('regTelefono').value;
            const email = document.getElementById('regEmail').value;
            if (!usuario || !password || !nombre || !apellidos || !ci) { mostrarNotificacion('Complete campos obligatorios', 'error'); return; }
            try {
                const res = await fetch('/api/registro', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ usuario, password, nombre, apellidos, ci, telefono, email }) });
                const data = await res.json();
                if (data.token) {
                    token = data.token; localStorage.setItem('token', token);
                    document.getElementById('authScreen').classList.add('hidden');
                    document.getElementById('userName').innerHTML = `👤 ${data.usuario.nombre.split(' ')[0]}`;
                    iniciarMapaFondo();
                    cargarPerfil(); cargarHistorial(); cargarDirecciones();
                    mostrarNotificacion('Registro exitoso', 'exito');
                } else { mostrarNotificacion(data.error || 'Error', 'error'); }
            } catch (error) { mostrarNotificacion('Error de conexión', 'error'); }
        }
        
        async function cargarPerfil() {
            try {
                const res = await fetch('/api/perfil', { headers: { 'Authorization': 'Bearer ' + token } });
                const data = await res.json();
                if (data.usuario) {
                    const u = data.usuario;
                    document.getElementById('perfilInfo').innerHTML = `<strong>${u.nombre} ${u.apellidos || ''}</strong><br>CI: ${u.ci || '-'}<br>Tel: ${u.telefono || '-'}<br>Email: ${u.email || '-'}<br>Usuario: ${u.usuario}`;
                }
            } catch (error) { document.getElementById('perfilInfo').innerHTML = 'Error'; }
        }
        
        async function editarPerfil() {
            const nombre = prompt('Nuevo nombre:');
            const telefono = prompt('Nuevo teléfono:');
            const email = prompt('Nuevo email:');
            if (!nombre && !telefono && !email) return;
            try {
                await fetch('/api/perfil', { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ nombre, telefono, email }) });
                mostrarNotificacion('Perfil actualizado', 'exito'); cargarPerfil();
            } catch (error) { mostrarNotificacion('Error', 'error'); }
        }
        
        async function cargarDirecciones() {
            try {
                const res = await fetch('/api/direcciones', { headers: { 'Authorization': 'Bearer ' + token } });
                const data = await res.json();
                const dirs = data.direcciones || [];
                const div = document.getElementById('direccionesLista');
                if (dirs.length === 0) { div.innerHTML = '<p class="text-center">No hay direcciones</p>'; }
                else {
                    div.innerHTML = dirs.map(d => `<div class="direccion-item"><span>📍 ${d.nombre}: ${d.direccion}</span><span style="color:#f44336" onclick="eliminarDireccion(${d.id})">✖</span></div>`).join('');
                }
            } catch(e) {}
        }
        
        async function agregarDireccion() {
            const nombre = prompt('Nombre (ej: Casa):');
            const direccion = prompt('Dirección:');
            if (nombre && direccion) {
                await fetch('/api/direcciones', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ nombre, direccion }) });
                cargarDirecciones();
            }
        }
        
        async function eliminarDireccion(id) {
            await fetch(`/api/direcciones/${id}`, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
            cargarDirecciones();
        }
        
        async function solicitarTaxi() {
            const origen = document.getElementById('origen').value;
            const destino = document.getElementById('destino').value;
            if (!origen || !destino) { mostrarNotificacion('Complete origen y destino', 'error'); return; }
            const btn = document.getElementById('btnSolicitar');
            btn.disabled = true; btn.innerHTML = '<span class="loading"></span>';
            try {
                const res = await fetch('/api/viajes/solicitar', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ origen, destino, categoria: categoriaSeleccionada }) });
                const data = await res.json();
                if (data.exito) {
                    viajeActual = data.viaje;
                    document.getElementById('viajeActivoCard').style.display = 'block';
                    actualizarEstadoUI();
                    iniciarSeguimiento();
                    mostrarNotificacion('✅ Taxi solicitado', 'exito');
                    document.getElementById('origen').value = '';
                    document.getElementById('destino').value = '';
                    document.getElementById('categoriasSection').classList.add('hidden');
                    document.getElementById('precioSection').classList.add('hidden');
                    document.getElementById('btnSolicitar').classList.add('hidden');
                    cargarHistorial();
                } else { mostrarNotificacion(data.error || 'Error', 'error'); }
            } catch(e) { mostrarNotificacion('Error', 'error'); }
            finally { btn.disabled = false; btn.innerHTML = 'Confirmar Taxi'; }
        }
        
        function actualizarEstadoUI() {
            if (!viajeActual) return;
            let texto = '';
            switch(viajeActual.estado) {
                case 'buscando_chofer': texto = '🔄 Buscando chofer...'; break;
                case 'aceptado': texto = '✅ Chofer en camino'; break;
                case 'en_curso': texto = '🚗 En camino'; break;
                case 'completado': texto = '🏁 Viaje completado'; detenerSeguimiento(); setTimeout(() => { document.getElementById('viajeActivoCard').style.display = 'none'; cargarHistorial(); }, 3000); break;
                default: texto = viajeActual.estado;
            }
            document.getElementById('viajeActivoInfo').innerHTML = `<div style="font-weight:bold">${texto}</div><div>${viajeActual.origen} → ${viajeActual.destino}</div><div>💰 ${viajeActual.precio_base} CUP</div>`;
        }
        
        async function cancelarViaje() { if (!confirm('¿Cancelar?')) return; await fetch(`/api/viajes/cancelar/${viajeActual.id}`, { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } }); mostrarNotificacion('Cancelado', 'exito'); document.getElementById('viajeActivoCard').style.display = 'none'; viajeActual = null; detenerSeguimiento(); }
        
        async function consultarEstado() { if (!viajeActual) return; try { const res = await fetch(`/api/viajes/estado/${viajeActual.id}`, { headers: { 'Authorization': 'Bearer ' + token } }); const data = await res.json(); if (data.viaje) { viajeActual = data.viaje; actualizarEstadoUI(); } } catch(e) {} }
        
        function iniciarSeguimiento() { if (intervaloTimer) clearInterval(intervaloTimer); intervaloTimer = setInterval(consultarEstado, 5000); }
        function detenerSeguimiento() { if (intervaloTimer) clearInterval(intervaloTimer); intervaloTimer = null; }
        
        async function cargarHistorial() {
            try {
                const res = await fetch('/api/viajes/mis-viajes', { headers: { 'Authorization': 'Bearer ' + token } });
                const data = await res.json();
                const viajes = data.viajes || [];
                if (viajes.length === 0) { document.getElementById('historialLista').innerHTML = '<p class="text-center">No hay viajes</p>'; }
                else {
                    document.getElementById('historialLista').innerHTML = viajes.map(v => `<div class="viaje-item"><div><strong>${v.origen} → ${v.destino}</strong><br><small>${new Date(v.creado_en).toLocaleString()}</small><br>${v.estado}</div><div>${v.precio_final || v.precio_base} CUP</div></div>`).join('');
                }
            } catch(e) { document.getElementById('historialLista').innerHTML = 'Error'; }
        }
        
        function cerrarSesion() { localStorage.removeItem('token'); location.reload(); }
        
        document.getElementById('destino').addEventListener('input', verificarOrigenDestino);
        
        if (token) {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('userName').innerHTML = '👤 Cliente';
            iniciarMapaFondo();
            cargarPerfil(); cargarHistorial(); cargarDirecciones();
        }
    </script>
</body>
</html>
