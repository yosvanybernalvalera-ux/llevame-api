<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LLévame - Cliente</title>
    
    <!-- Leaflet CSS (mapas) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            background: url('https://images.unsplash.com/photo-1449824913935-59a10b8d2000?q=80&w=1920') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }
        
        /* Overlay oscuro para que el texto sea legible */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }
        
        /* Todo el contenido por encima del overlay */
        .header, .container, .notification {
            position: relative;
            z-index: 1;
        }
        
        .header {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        
        .header h1 { font-size: 24px; }
        .header p { font-size: 12px; opacity: 0.8; margin-top: 5px; }
        
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        
        /* Tarjetas transparentes con blur */
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .card h2 { font-size: 18px; margin-bottom: 15px; color: #333; }
        .card h3 { font-size: 16px; margin-bottom: 10px; color: #555; }
        
        input, select {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            background: white;
        }
        
        input:focus { outline: none; border-color: #FF9800; }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #FF9800, #F57C00);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }
        
        button:active { transform: scale(0.98); }
        button.secondary { background: linear-gradient(135deg, #666, #555); }
        button.danger { background: linear-gradient(135deg, #f44336, #d32f2f); }
        button.success { background: linear-gradient(135deg, #4CAF50, #388E3C); }
        
        /* Categorías */
        .categorias {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        
        .categoria-card {
            background: rgba(249, 249, 249, 0.9);
            border: 2px solid rgba(238, 238, 238, 0.8);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .categoria-card.selected {
            border-color: #FF9800;
            background: rgba(255, 243, 224, 0.95);
        }
        
        .categoria-icon { font-size: 28px; display: block; margin-bottom: 5px; }
        .categoria-nombre { font-size: 12px; font-weight: bold; }
        .categoria-precio { font-size: 11px; color: #FF9800; margin-top: 3px; }
        
        /* Precio */
        .precio-box {
            background: linear-gradient(135deg, #FFF3E0, #FFE0B2);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            margin: 15px 0;
        }
        .precio-box .label { font-size: 12px; color: #666; }
        .precio-box .valor { font-size: 28px; font-weight: bold; color: #FF9800; }
        
        /* Mapa */
        .mapa-container {
            margin: 15px 0;
            border-radius: 12px;
            overflow: hidden;
        }
        #mapa { height: 250px; width: 100%; background: #e0e0e0; }
        
        /* Viaje activo */
        .viaje-activo { background: rgba(227, 242, 253, 0.95); border-left: 4px solid #2196F3; }
        
        /* Calificación */
        .stars { display: flex; gap: 10px; justify-content: center; margin: 15px 0; }
        .star { font-size: 30px; cursor: pointer; color: #ddd; }
        .star.active { color: #FF9800; }
        
        /* Direcciones */
        .direccion-item {
            background: rgba(245, 245, 245, 0.9);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .viaje-item {
            padding: 12px;
            border-bottom: 1px solid rgba(238, 238, 238, 0.8);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .viaje-item:last-child { border-bottom: none; }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 5px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            background: none;
            color: #666;
            font-weight: normal;
            box-shadow: none;
        }
        .tab.active {
            background: #FF9800;
            color: white;
            border-radius: 10px;
        }
        
        /* Perfil */
        .perfil-info {
            background: rgba(240, 240, 240, 0.9);
            padding: 15px;
            border-radius: 12px;
            line-height: 1.6;
            margin-bottom: 10px;
        }
        
        /* Notificaciones */
        .notification {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(51, 51, 51, 0.95);
            backdrop-filter: blur(10px);
            color: white;
            padding: 14px;
            border-radius: 12px;
            text-align: center;
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .hidden { display: none; }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Botón ubicación actual */
        .btn-ubicacion {
            background: #2196F3;
            padding: 8px;
            margin-top: 5px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚕 LLévame</h1>
        <p id="userName">Tu taxi en Cuba</p>
    </div>

    <div class="container" id="app">
        <!-- Pantalla de bienvenida -->
        <div id="authScreen">
            <div class="card">
                <h2>🔐 Bienvenido</h2>
                <button onclick="mostrarLogin()">Iniciar sesión</button>
                <button onclick="mostrarRegistro()" class="secondary" style="margin-top: 10px;">Registrarme</button>
            </div>
        </div>

        <!-- Pantalla de login -->
        <div id="loginScreen" class="hidden">
            <div class="card">
                <h2>Iniciar sesión</h2>
                <input type="text" id="loginUsuario" placeholder="Usuario">
                <input type="password" id="loginPassword" placeholder="Contraseña">
                <button onclick="login()">Entrar</button>
                <button onclick="volver()" class="secondary" style="margin-top: 10px;">Volver</button>
            </div>
        </div>

        <!-- Pantalla de registro -->
        <div id="registroScreen" class="hidden">
            <div class="card">
                <h2>Registro de Cliente</h2>
                <input type="text" id="regUsuario" placeholder="Usuario *">
                <input type="password" id="regPassword" placeholder="Contraseña *">
                <input type="text" id="regNombre" placeholder="Nombre *">
                <input type="text" id="regApellidos" placeholder="Apellidos *">
                <input type="text" id="regCi" placeholder="Carnet de Identidad *">
                <input type="tel" id="regTelefono" placeholder="Teléfono">
                <input type="email" id="regEmail" placeholder="Email">
                <button onclick="registro()">Registrarme</button>
                <button onclick="volver()" class="secondary" style="margin-top: 10px;">Volver</button>
            </div>
        </div>

        <!-- Pantalla principal -->
        <div id="mainScreen" class="hidden">
            <div class="tabs">
                <button class="tab active" onclick="cambiarTab('viaje')">🚖 Viaje</button>
                <button class="tab" onclick="cambiarTab('historial')">📋 Historial</button>
                <button class="tab" onclick="cambiarTab('perfil')">👤 Perfil</button>
            </div>

            <!-- Tab Viaje -->
            <div id="tabViaje">
                <!-- Mapa -->
                <div class="card">
                    <h3>🗺️ Tu ubicación</h3>
                    <div class="mapa-container">
                        <div id="mapa"></div>
                    </div>
                    <button class="btn-ubicacion" onclick="obtenerUbicacionActual()">📍 Usar mi ubicación actual</button>
                </div>

                <!-- Direcciones frecuentes -->
                <div class="card">
                    <h3>📍 Mis direcciones</h3>
                    <div id="direccionesLista"></div>
                    <button onclick="agregarDireccion()" class="secondary" style="margin-top: 10px; background: #999;">+ Agregar dirección</button>
                </div>

                <!-- Pedir taxi -->
                <div class="card">
                    <h3>🚕 Pedir Taxi</h3>
                    <input type="text" id="origen" placeholder="¿Dónde estás?">
                    <input type="text" id="destino" placeholder="¿A dónde vas?">
                    
                    <div class="categorias" id="categorias"></div>
                    
                    <div class="precio-box">
                        <div class="label">Precio estimado</div>
                        <div class="valor" id="precioEstimado">-- CUP</div>
                    </div>
                    
                    <button id="btnSolicitar" onclick="solicitarTaxi()">Solicitar Taxi</button>
                </div>

                <!-- Viaje activo -->
                <div class="card viaje-activo" id="viajeActivoCard" style="display: none;">
                    <h3>🚖 Viaje en curso</h3>
                    <div id="viajeActivoInfo"></div>
                    <div class="mapa-container" id="mapaChoferContainer" style="display: none;">
                        <div id="mapaChofer"></div>
                    </div>
                    <button id="btnCancelarViaje" onclick="cancelarViaje()" class="danger">Cancelar viaje</button>
                </div>
            </div>

            <!-- Tab Historial -->
            <div id="tabHistorial" class="hidden">
                <div class="card">
                    <h3>📋 Mis viajes</h3>
                    <div id="historialLista">Cargando...</div>
                </div>
            </div>

            <!-- Tab Perfil -->
            <div id="tabPerfil" class="hidden">
                <div class="card">
                    <h3>👤 Mi perfil</h3>
                    <div id="perfilInfo" class="perfil-info">Cargando...</div>
                    <button onclick="editarPerfil()" style="background: #2196F3;">Editar perfil</button>
                    <button onclick="cerrarSesion()" class="danger" style="margin-top: 10px;">Cerrar sesión</button>
                </div>
            </div>
        </div>
    </div>

    <div id="notification" class="notification hidden"></div>

    <script>
        let token = localStorage.getItem('token');
        let categoriaSeleccionada = 'economico';
        let viajeActual = null;
        let intervaloTimer = null;
        let calificacionSeleccionada = 0;
        let mapaActual = null;
        let marcadorActual = null;
        let mapaChoferActual = null;
        let ubicacionCliente = { lat: 23.1365, lng: -82.3589 }; // Centro de La Habana por defecto
        
        const preciosBase = { economico: 100, confort: 150, clasico: 200, lujo: 300, moto: 80, triciclo: 50 };
        const categorias = [
            { id: 'economico', nombre: 'Económico', icono: '🚗', precio: 100 },
            { id: 'confort', nombre: 'Confort', icono: '🚙', precio: 150 },
            { id: 'clasico', nombre: 'Clásico', icono: '🚘', precio: 200 },
            { id: 'lujo', nombre: 'Lujo', icono: '✨', precio: 300 },
            { id: 'moto', nombre: 'Moto', icono: '🏍️', precio: 80 },
            { id: 'triciclo', nombre: 'Triciclo', icono: '🛺', precio: 50 }
        ];

        // ============= INICIALIZAR MAPA =============
        function iniciarMapa() {
            if (mapaActual) return;
            mapaActual = L.map('mapa').setView([ubicacionCliente.lat, ubicacionCliente.lng], 15);
            
            // Usar estilo de mapa detallado (OpenStreetMap con CartoDB)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
                subdomains: 'abcd',
                maxZoom: 19,
                minZoom: 12
            }).addTo(mapaActual);
            
            // Agregar marcador del cliente
            marcadorActual = L.marker([ubicacionCliente.lat, ubicacionCliente.lng], {
                icon: L.divIcon({ html: '🚕', iconSize: [30, 30], className: 'marcador-cliente' })
            }).addTo(mapaActual);
            marcadorActual.bindPopup('Tu ubicación').openPopup();
        }
        
        function actualizarMarcadorCliente(lat, lng) {
            ubicacionCliente = { lat, lng };
            if (marcadorActual) {
                marcadorActual.setLatLng([lat, lng]);
                mapaActual.setView([lat, lng], 15);
                marcadorActual.bindPopup('Tu ubicación').openPopup();
            }
        }
        
        function iniciarMapaChofer(lat, lng) {
            if (mapaChoferActual) {
                mapaChoferActual.remove();
            }
            mapaChoferActual = L.map('mapaChofer').setView([lat, lng], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CARTO',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(mapaChoferActual);
            
            L.marker([lat, lng], {
                icon: L.divIcon({ html: '🚖', iconSize: [30, 30], className: 'marcador-chofer' })
            }).addTo(mapaChoferActual).bindPopup('Chofer').openPopup();
        }
        
        function obtenerUbicacionActual() {
            if (navigator.geolocation) {
                mostrarNotificacion('Obteniendo ubicación...', 'exito');
                navigator.geolocation.getCurrentPosition(position => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    actualizarMarcadorCliente(lat, lng);
                    document.getElementById('origen').value = `Lat: ${lat.toFixed(4)}, Lng: ${lng.toFixed(4)}`;
                    mostrarNotificacion('Ubicación obtenida', 'exito');
                }, error => {
                    mostrarNotificacion('Error al obtener ubicación. Activa el GPS', 'error');
                });
            } else {
                mostrarNotificacion('Tu navegador no soporta geolocalización', 'error');
            }
        }
        
        // ============= FUNCIONES PRINCIPALES =============
        function init() {
            cargarCategorias();
            cargarDirecciones();
            iniciarMapa();
            document.getElementById('origen').addEventListener('input', actualizarPrecio);
            document.getElementById('destino').addEventListener('input', actualizarPrecio);
        }

        function cargarCategorias() {
            const container = document.getElementById('categorias');
            container.innerHTML = categorias.map(cat => `
                <div class="categoria-card ${categoriaSeleccionada === cat.id ? 'selected' : ''}" onclick="seleccionarCategoria('${cat.id}')">
                    <span class="categoria-icon">${cat.icono}</span>
                    <span class="categoria-nombre">${cat.nombre}</span>
                    <span class="categoria-precio">${cat.precio} CUP</span>
                </div>
            `).join('');
        }

        function seleccionarCategoria(catId) {
            categoriaSeleccionada = catId;
            cargarCategorias();
            actualizarPrecio();
        }

        function actualizarPrecio() {
            const origen = document.getElementById('origen').value;
            const destino = document.getElementById('destino').value;
            let precio = preciosBase[categoriaSeleccionada] || 100;
            if (origen && destino) precio = precio + (origen.length + destino.length) * 2;
            document.getElementById('precioEstimado').innerHTML = `${precio} CUP`;
        }

        function cambiarTab(tab) {
            document.getElementById('tabViaje').classList.add('hidden');
            document.getElementById('tabHistorial').classList.add('hidden');
            document.getElementById('tabPerfil').classList.add('hidden');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            
            if (tab === 'viaje') {
                document.getElementById('tabViaje').classList.remove('hidden');
                document.querySelectorAll('.tab')[0].classList.add('active');
                setTimeout(() => mapaActual?.invalidateSize(), 100);
            } else if (tab === 'historial') {
                document.getElementById('tabHistorial').classList.remove('hidden');
                document.querySelectorAll('.tab')[1].classList.add('active');
                cargarHistorial();
            } else if (tab === 'perfil') {
                document.getElementById('tabPerfil').classList.remove('hidden');
                document.querySelectorAll('.tab')[2].classList.add('active');
                cargarPerfil();
            }
        }

        function mostrarNotificacion(msg, tipo) {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.classList.remove('hidden');
            notif.style.background = tipo === 'error' ? '#f44336' : '#4CAF50';
            setTimeout(() => notif.classList.add('hidden'), 3000);
        }

        function mostrarLogin() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
        }

        function mostrarRegistro() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('registroScreen').classList.remove('hidden');
        }

        function volver() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('registroScreen').classList.add('hidden');
            document.getElementById('authScreen').classList.remove('hidden');
        }

        async function login() {
            const usuario = document.getElementById('loginUsuario').value;
            const password = document.getElementById('loginPassword').value;
            if (!usuario || !password) { mostrarNotificacion('Completa usuario y contraseña', 'error'); return; }
            
            try {
                const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ usuario, password }) });
                const data = await res.json();
                if (data.token) {
                    token = data.token; localStorage.setItem('token', token);
                    document.getElementById('mainScreen').classList.remove('hidden');
                    document.getElementById('authScreen').classList.add('hidden');
                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('userName').innerHTML = `👤 ${data.usuario.nombre}`;
                    init(); cargarPerfil(); cargarHistorial();
                    mostrarNotificacion(`Bienvenido ${data.usuario.nombre}`, 'exito');
                } else { mostrarNotificacion(data.error || 'Error', 'error'); }
            } catch (error) { mostrarNotificacion('Error de conexión', 'error'); }
        }

        async function registro() {
            const usuario = document.getElementById('regUsuario').value;
            const password = document.getElementById('regPassword').value;
            const nombre = document.getElementById('regNombre').value;
            const apellidos = document.getElementById('regApellidos').value;
            const ci = document.getElementById('regCi').value;
            const telefono = document.getElementById('regTelefono').value;
            const email = document.getElementById('regEmail').value;
            
            if (!usuario || !password || !nombre || !apellidos || !ci) { mostrarNotificacion('Completa los campos obligatorios (*)', 'error'); return; }
            
            try {
                const res = await fetch('/api/registro', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ usuario, password, nombre, apellidos, ci, telefono, email }) });
                const data = await res.json();
                if (data.token) {
                    token = data.token; localStorage.setItem('token', token);
                    document.getElementById('mainScreen').classList.remove('hidden');
                    document.getElementById('authScreen').classList.add('hidden');
                    document.getElementById('registroScreen').classList.add('hidden');
                    document.getElementById('userName').innerHTML = `👤 ${data.usuario.nombre}`;
                    init(); cargarPerfil(); cargarHistorial();
                    mostrarNotificacion('Registro exitoso. Bienvenido', 'exito');
                } else { mostrarNotificacion(data.error || 'Error al registrar', 'error'); }
            } catch (error) { mostrarNotificacion('Error de conexión', 'error'); }
        }

        async function cargarPerfil() {
            try {
                const res = await fetch('/api/perfil', { headers: { 'Authorization': 'Bearer ' + token } });
                const data = await res.json();
                if (data.usuario) {
                    const u = data.usuario;
                    document.getElementById('perfilInfo').innerHTML = `<strong>${u.nombre || 'Sin nombre'} ${u.apellidos || ''}</strong><br>CI: ${u.ci || 'No registrado'}<br>Teléfono: ${u.telefono || 'No registrado'}<br>Email: ${u.email || 'No registrado'}<br>Usuario: ${u.usuario}<br>Tipo: ${u.rol === 'admin' ? 'Administrador' : 'Cliente'}`;
                }
            } catch (error) { document.getElementById('perfilInfo').innerHTML = 'Error al cargar perfil'; }
        }

        async function editarPerfil() {
            const nuevoNombre = prompt('Nuevo nombre:');
            const nuevoTelefono = prompt('Nuevo teléfono:');
            const nuevoEmail = prompt('Nuevo email:');
            if (!nuevoNombre && !nuevoTelefono && !nuevoEmail) return;
            try {
                const res = await fetch('/api/perfil', { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ nombre: nuevoNombre, telefono: nuevoTelefono, email: nuevoEmail }) });
                const data = await res.json();
                if (data.exito) { mostrarNotificacion('Perfil actualizado', 'exito'); cargarPerfil(); }
                else { mostrarNotificacion(data.error || 'Error al actualizar', 'error'); }
            } catch (error) { mostrarNotificacion('Error de conexión', 'error'); }
        }

        async function cargarDirecciones() {
            try {
                const res = await fetch('/api/direcciones', { headers: { 'Authorization': 'Bearer ' + token } });
                const data = await res.json();
                const direcciones = data.direcciones || [];
                const listaDiv = document.getElementById('direccionesLista');
                if (direcciones.length === 0) { listaDiv.innerHTML = '<p>No hay direcciones guardadas</p>'; }
                else {
                    listaDiv.innerHTML = direcciones.map(d => `<div class="direccion-item" onclick="usarDireccion('${d.direccion}')"><span>📍 ${d.nombre}: ${d.direccion}</span><span style="color:#f44336;" onclick="event.stopPropagation();eliminarDireccion(${d.id})">✖</span></div>`).join('');
                }
            } catch (error) { console.error('Error:', error); }
        }

        function usarDireccion(direccion) { document.getElementById('origen').value = direccion; actualizarPrecio(); }
        
        async function agregarDireccion() {
            const nombre = prompt('Nombre de la dirección (ej: Casa, Trabajo):');
            const direccion = prompt('Dirección:');
            if (nombre && direccion) {
                await fetch('/api/direcciones', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ nombre, direccion }) });
                cargarDirecciones();
            }
        }
        
        async function eliminarDireccion(id) {
            await fetch(`/api/direcciones/${id}`, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
            cargarDirecciones();
        }

        async function solicitarTaxi() {
            const origen = document.getElementById('origen').value;
            const destino = document.getElementById('destino').value;
            if (!origen || !destino) { mostrarNotificacion('Completa origen y destino', 'error'); return; }
            
            const btn = document.getElementById('btnSolicitar');
            btn.disabled = true; btn.innerHTML = '<span class="loading"></span> Buscando chofer...';
            
            try {
                const res = await fetch('/api/viajes/solicitar', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ origen, destino, categoria: categoriaSeleccionada }) });
                const data = await res.json();
                if (data.exito) {
                    viajeActual = data.viaje;
                    document.getElementById('viajeActivoCard').style.display = 'block';
                    actualizarEstadoUI();
                    iniciarSeguimiento();
                    mostrarNotificacion('✅ Taxi solicitado', 'exito');
                    document.getElementById('origen').value = '';
                    document.getElementById('destino').value = '';
                    cargarHistorial();
                } else { mostrarNotificacion(data.error || 'Error', 'error'); }
            } catch (error) { mostrarNotificacion('Error de conexión', 'error'); }
            finally { btn.disabled = false; btn.innerHTML = 'Solicitar Taxi'; }
        }

        function actualizarEstadoUI() {
            if (!viajeActual) return;
            let estadoTexto = '', estadoColor = '';
            switch(viajeActual.estado) {
                case 'buscando_chofer': estadoTexto = '🔄 Buscando chofer...'; estadoColor = '#FF9800'; break;
                case 'aceptado': estadoTexto = '✅ Chofer asignado. En camino'; estadoColor = '#4CAF50'; 
                    document.getElementById('mapaChoferContainer').style.display = 'block';
                    setTimeout(() => iniciarMapaChofer(23.1365, -82.3589), 100);
                    break;
                case 'en_curso': estadoTexto = '🚗 En camino a tu destino'; estadoColor = '#2196F3'; break;
                case 'completado': estadoTexto = '🏁 Viaje completado'; estadoColor = '#9E9E9E'; detenerSeguimiento(); setTimeout(() => { document.getElementById('viajeActivoCard').style.display = 'none'; cargarHistorial(); }, 3000); break;
                default: estadoTexto = viajeActual.estado;
            }
            document.getElementById('viajeActivoInfo').innerHTML = `<div style="color: ${estadoColor}; font-weight: bold; margin-bottom: 10px;">${estadoTexto}</div><div>📍 ${viajeActual.origen} → ${viajeActual.destino}</div><div>💰 ${viajeActual.precio_base} CUP</div><div>🚗 ${viajeActual.categoria}</div>`;
            if (viajeActual.estado === 'completado' && !document.getElementById('stars')) {
                document.getElementById('viajeActivoInfo').innerHTML += `<div style="text-align: center; margin-top: 15px;"><p>¿Cómo fue tu viaje?</p><div class="stars" id="stars">${[1,2,3,4,5].map(i => `<span class="star" onclick="calificar(${i})">★</span>`).join('')}</div><button onclick="enviarCalificacion()" class="success">Enviar calificación</button></div>`;
            }
        }

        function calificar(puntos) { calificacionSeleccionada = puntos; document.querySelectorAll('.star').forEach((star, i) => { if (i < puntos) star.classList.add('active'); else star.classList.remove('active'); }); }
        async function enviarCalificacion() { if (calificacionSeleccionada > 0) { await fetch(`/api/viajes/calificar/${viajeActual.id}`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ puntuacion: calificacionSeleccionada }) }); mostrarNotificacion(`¡Gracias por calificar ${calificacionSeleccionada} estrellas!`, 'exito'); } }

        async function cancelarViaje() { if (!confirm('¿Cancelar este viaje?')) return; await fetch(`/api/viajes/cancelar/${viajeActual.id}`, { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } }); mostrarNotificacion('Viaje cancelado', 'exito'); document.getElementById('viajeActivoCard').style.display = 'none'; viajeActual = null; detenerSeguimiento(); }
        
        async function consultarEstado() { if (!viajeActual) return; try { const res = await fetch(`/api/viajes/estado/${viajeActual.id}`, { headers: { 'Authorization': 'Bearer ' + token } }); const data = await res.json(); if (data.viaje) { viajeActual = data.viaje; actualizarEstadoUI(); } } catch (error) { console.error('Error:', error); } }
        
        function iniciarSeguimiento() { if (intervaloTimer) clearInterval(intervaloTimer); intervaloTimer = setInterval(consultarEstado, 5000); }
        function detenerSeguimiento() { if (intervaloTimer) clearInterval(intervaloTimer); intervaloTimer = null; }

        async function cargarHistorial() {
            try {
                const res = await fetch('/api/viajes/mis-viajes', { headers: { 'Authorization': 'Bearer ' + token } });
                const data = await res.json();
                const viajes = data.viajes || [];
                if (viajes.length === 0) { document.getElementById('historialLista').innerHTML = '<p>No hay viajes aún</p>'; }
                else { document.getElementById('historialLista').innerHTML = viajes.map(v => `<div class="viaje-item"><div><strong>${v.origen} → ${v.destino}</strong><br><small>${new Date(v.creado_en).toLocaleString()}</small><br>${v.estado}</div><div>${v.precio_final || v.precio_base} CUP</div></div>`).join(''); }
            } catch (error) { document.getElementById('historialLista').innerHTML = 'Error al cargar'; }
        }

        function cerrarSesion() { localStorage.removeItem('token'); location.reload(); }

        if (token) { document.getElementById('mainScreen').classList.remove('hidden'); document.getElementById('authScreen').classList.add('hidden'); init(); cargarPerfil(); cargarHistorial(); }
    </script>
</body>
</html>
