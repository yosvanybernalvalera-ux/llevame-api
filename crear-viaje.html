<!DOCTYPE html>
<html>
<head>
    <title>Crear Viaje Nuevo - LLévame</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>Crear Viaje con coordenadas</h1>
    <button onclick="crearViaje()">Crear Viaje</button>
    <div id="resultado"></div>
    <script>
        async function crearViaje() {
            const resultado = document.getElementById('resultado');
            resultado.innerHTML = 'Iniciando...';
            
            const loginRes = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usuario: 'Yosvany3105', password: 'Yovi.3105' })
            });
            const loginData = await loginRes.json();
            
            const viajeRes = await fetch('/api/viajes/solicitar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + loginData.token },
                body: JSON.stringify({
                    origen: 'Parque Central, La Habana',
                    destino: 'Vedado, La Habana',
                    origen_lat: 23.1365,
                    origen_lng: -82.3589,
                    destino_lat: 23.1234,
                    destino_lng: -82.3987,
                    categoria: 'moto'
                })
            });
            const viajeData = await viajeRes.json();
            resultado.innerHTML = '<pre>' + JSON.stringify(viajeData, null, 2) + '</pre>';
            if (viajeData.exito) {
                resultado.innerHTML += '<p style="color:green">✅ Viaje creado. Ahora ve a la app chofer y acéptalo.</p>';
            }
        }
    </script>
</body>
</html>
